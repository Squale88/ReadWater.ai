<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f6feb"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b8530c"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b8a3e"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="1400" height="60" fill="#0b2447"/>
  <text x="700" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">
    v1 Phase Contracts — Inputs &amp; Outputs
  </text>
  <text x="700" y="52" text-anchor="middle" font-size="11" fill="#cbd5e1">
    Each phase is a typed contract. Outputs of one phase = inputs of the next. E and G operate on everything that precedes them.
  </text>

  <!-- External sources band -->
  <g>
    <rect x="40" y="84" width="1320" height="60" rx="6" fill="#f1f5f9" stroke="#475569" stroke-width="1" stroke-dasharray="6 3"/>
    <text x="60" y="104" font-size="12" font-weight="700" fill="#334155">External inputs (read-only)</text>
    <text x="60" y="124" font-size="11" fill="#475569">Google Static Maps · NAIP 4-band imagery · NOAA ENC channels · FWC oyster / seagrass · water / land masks · starting coords + zoom · prompt registry</text>
  </g>

  <!-- Phase A -->
  <g filter="url(#shadow)">
    <rect x="40" y="170" width="300" height="196" rx="8" fill="#dbeafe" stroke="#1f6feb" stroke-width="2"/>
    <rect x="40" y="170" width="300" height="32" rx="8" fill="#1f6feb"/>
    <text x="60" y="192" font-size="13" font-weight="700" fill="#fff">Phase A — Recursive Discovery</text>
    <text x="56" y="222" font-size="11" font-weight="700" fill="#334155">in</text>
    <text x="80" y="222" font-size="10" fill="#334155">starting coords, zoom (10/12)</text>
    <text x="80" y="238" font-size="10" fill="#334155">grid defs · exclusion rules</text>
    <text x="80" y="254" font-size="10" fill="#334155">overview imagery (z10–z15)</text>
    <text x="56" y="284" font-size="11" font-weight="700" fill="#334155">out</text>
    <text x="80" y="284" font-size="10" fill="#334155">Cell[] {id, zoom, bounds,</text>
    <text x="80" y="300" font-size="10" fill="#334155">center, parent_lineage,</text>
    <text x="80" y="316" font-size="10" fill="#334155">fishable: bool, confidence,</text>
    <text x="80" y="332" font-size="10" fill="#334155">notes, imagery_refs}</text>
    <text x="80" y="352" font-size="10" fill="#64748b" font-style="italic">state = draft</text>
  </g>

  <line x1="340" y1="270" x2="395" y2="270" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Phase B -->
  <g filter="url(#shadow)">
    <rect x="395" y="170" width="300" height="196" rx="8" fill="#dbeafe" stroke="#1f6feb" stroke-width="2"/>
    <rect x="395" y="170" width="300" height="32" rx="8" fill="#1f6feb"/>
    <text x="415" y="192" font-size="13" font-weight="700" fill="#fff">Phase B — Context Assembly</text>
    <text x="411" y="222" font-size="11" font-weight="700" fill="#334155">in</text>
    <text x="435" y="222" font-size="10" fill="#334155">qualified z16 Cell</text>
    <text x="435" y="238" font-size="10" fill="#334155">ancestor + positional imagery</text>
    <text x="435" y="254" font-size="10" fill="#334155">overlays (NOAA/FWC/NAIP)</text>
    <text x="411" y="284" font-size="11" font-weight="700" fill="#334155">out</text>
    <text x="435" y="284" font-size="10" fill="#334155">Z16ContextBundle {cell_id,</text>
    <text x="435" y="300" font-size="10" fill="#334155">image_refs, overlay_summaries,</text>
    <text x="435" y="316" font-size="10" fill="#334155">evidence[] (tagged known_fact</text>
    <text x="435" y="332" font-size="10" fill="#334155">or inference), uncertainty[]}</text>
    <text x="435" y="352" font-size="10" fill="#64748b" font-style="italic">state = draft</text>
  </g>

  <line x1="695" y1="270" x2="750" y2="270" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Phase C -->
  <g filter="url(#shadow)">
    <rect x="750" y="170" width="300" height="196" rx="8" fill="#dbeafe" stroke="#1f6feb" stroke-width="2"/>
    <rect x="750" y="170" width="300" height="32" rx="8" fill="#1f6feb"/>
    <text x="770" y="192" font-size="13" font-weight="700" fill="#fff">Phase C — Anchor Identification</text>
    <text x="766" y="222" font-size="11" font-weight="700" fill="#334155">in</text>
    <text x="790" y="222" font-size="10" fill="#334155">Z16ContextBundle (validated)</text>
    <text x="766" y="252" font-size="11" font-weight="700" fill="#334155">out</text>
    <text x="790" y="252" font-size="10" fill="#334155">AnchorStructure[] {id, type,</text>
    <text x="790" y="268" font-size="10" fill="#334155">label, rough_center, rough_extent,</text>
    <text x="790" y="284" font-size="10" fill="#334155">confidence, why_matters,</text>
    <text x="790" y="300" font-size="10" fill="#334155">supporting_evidence, priority}</text>
    <text x="790" y="320" font-size="10" fill="#334155">+ Z18FetchPlan (seed)</text>
    <text x="790" y="336" font-size="10" fill="#334155">   {tile_centers, tile_budget}</text>
    <text x="790" y="356" font-size="10" fill="#64748b" font-style="italic">state = draft</text>
  </g>

  <line x1="1050" y1="270" x2="1105" y2="270" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Phase D -->
  <g filter="url(#shadow)">
    <rect x="1105" y="170" width="260" height="196" rx="8" fill="#dbeafe" stroke="#1f6feb" stroke-width="2"/>
    <rect x="1105" y="170" width="260" height="32" rx="8" fill="#1f6feb"/>
    <text x="1125" y="192" font-size="13" font-weight="700" fill="#fff">Phase D — Decomposition</text>
    <text x="1121" y="222" font-size="11" font-weight="700" fill="#334155">in</text>
    <text x="1145" y="222" font-size="10" fill="#334155">AnchorStructure (validated)</text>
    <text x="1145" y="238" font-size="10" fill="#334155">+ Z18FetchPlan (seed)</text>
    <text x="1145" y="254" font-size="10" fill="#334155">+ carry-forward bundle context</text>
    <text x="1121" y="284" font-size="11" font-weight="700" fill="#334155">out</text>
    <text x="1145" y="284" font-size="10" fill="#334155">LocalComplex {anchor_id, envelope}</text>
    <text x="1145" y="300" font-size="10" fill="#334155">MemberFeature[] {parent_anchor_id}</text>
    <text x="1145" y="316" font-size="10" fill="#334155">FishableSubzone[]</text>
    <text x="1145" y="332" font-size="10" fill="#334155">InfluenceZone[]</text>
    <text x="1145" y="352" font-size="10" fill="#64748b" font-style="italic">state = draft</text>
  </g>

  <!-- D internal expansion loop -->
  <path d="M1360,230 C1385,230 1385,270 1360,270" fill="none" stroke="#1f6feb" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-blue)"/>
  <text x="1395" y="255" font-size="9" fill="#1f6feb">bounded</text>
  <text x="1395" y="268" font-size="9" fill="#1f6feb">tile</text>
  <text x="1395" y="281" font-size="9" fill="#1f6feb">expand</text>

  <!-- Phase E lane -->
  <g>
    <rect x="40" y="420" width="1325" height="180" rx="8" fill="#fff7ed" stroke="#b8530c" stroke-width="2"/>
    <rect x="40" y="420" width="1325" height="32" rx="8" fill="#b8530c"/>
    <text x="60" y="442" font-size="13" font-weight="700" fill="#fff">Phase E — Validation (runs 3× · pure · non-blocking)</text>

    <g filter="url(#shadow)">
      <rect x="60" y="466" width="400" height="120" rx="6" fill="#fff" stroke="#b8530c" stroke-width="1.3"/>
      <text x="260" y="486" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">E₁ after Phase B</text>
      <text x="76" y="508" font-size="10" fill="#334155">in  Z16ContextBundle (draft)</text>
      <text x="76" y="528" font-size="10" fill="#334155">out ValidationReport + Finding[]</text>
      <text x="76" y="552" font-size="10" fill="#7c2d12">checks  schema · overlay alignment ·</text>
      <text x="76" y="568" font-size="10" fill="#7c2d12">provenance complete · known_fact tags</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="485" y="466" width="400" height="120" rx="6" fill="#fff" stroke="#b8530c" stroke-width="1.3"/>
      <text x="685" y="486" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">E₂ after Phase C</text>
      <text x="501" y="508" font-size="10" fill="#334155">in  AnchorStructure[] + Z18FetchPlan</text>
      <text x="501" y="528" font-size="10" fill="#334155">out ValidationReport + Finding[]</text>
      <text x="501" y="552" font-size="10" fill="#7c2d12">checks  center in cell · extent plausible ·</text>
      <text x="501" y="568" font-size="10" fill="#7c2d12">evidence present · fetch plan sanity</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="910" y="466" width="435" height="120" rx="6" fill="#fff" stroke="#b8530c" stroke-width="1.3"/>
      <text x="1127" y="486" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">E₃ after Phase D</text>
      <text x="926" y="508" font-size="10" fill="#334155">in  LocalComplex · Member · Subzone · Influence</text>
      <text x="926" y="528" font-size="10" fill="#334155">out ValidationReport + Finding[]</text>
      <text x="926" y="552" font-size="10" fill="#7c2d12">checks  parent_id resolves · no orphans ·</text>
      <text x="926" y="568" font-size="10" fill="#7c2d12">geometry sanity · subzone inside anchor extent</text>
    </g>
  </g>

  <!-- Finding schema -->
  <g filter="url(#shadow)">
    <rect x="40" y="620" width="640" height="120" rx="8" fill="#fffbeb" stroke="#a16207" stroke-width="1.3"/>
    <text x="60" y="642" font-size="12" font-weight="700" fill="#78350f">Finding shape (emitted by every E run)</text>
    <text x="60" y="664" font-size="11" fill="#78350f" font-family="Menlo, Consolas, monospace">{</text>
    <text x="80" y="680" font-size="11" fill="#78350f" font-family="Menlo, Consolas, monospace">issue_code, severity: info|warn|error,</text>
    <text x="80" y="696" font-size="11" fill="#78350f" font-family="Menlo, Consolas, monospace">object_id, field, message,</text>
    <text x="80" y="712" font-size="11" fill="#78350f" font-family="Menlo, Consolas, monospace">recommended_action  (advisory only in v1)</text>
    <text x="60" y="728" font-size="11" fill="#78350f" font-family="Menlo, Consolas, monospace">}</text>
  </g>

  <!-- Cross-cutting -->
  <g filter="url(#shadow)">
    <rect x="700" y="620" width="665" height="120" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.3"/>
    <text x="720" y="642" font-size="12" font-weight="700" fill="#334155">Cross-cutting on every emitted object</text>
    <text x="720" y="664" font-size="11" fill="#334155">• state ∈ {draft | validated | approved | rejected}</text>
    <text x="720" y="682" font-size="11" fill="#334155">• phase_history[] — append-only log of phase + actor + action</text>
    <text x="720" y="700" font-size="11" fill="#334155">• provenance — imagery refs, overlay refs, prompt id/version, provider config, input_hash</text>
    <text x="720" y="718" font-size="11" fill="#334155">• findings[] — travel with object into Phase G</text>
  </g>

  <!-- Phase G -->
  <g filter="url(#shadow)">
    <rect x="40" y="770" width="1325" height="160" rx="8" fill="#dcfce7" stroke="#2b8a3e" stroke-width="2"/>
    <rect x="40" y="770" width="1325" height="32" rx="8" fill="#2b8a3e"/>
    <text x="60" y="792" font-size="13" font-weight="700" fill="#fff">Phase G — Human Correction (minimal)</text>

    <text x="60" y="820" font-size="11" font-weight="700" fill="#166534">in</text>
    <text x="84" y="820" font-size="11" fill="#334155">validated AnchorStructure · its Member/Subzone/InfluenceZone · Z16 + z18 imagery refs · findings[] · provenance</text>

    <text x="60" y="844" font-size="11" font-weight="700" fill="#166534">operations</text>
    <text x="144" y="844" font-size="11" fill="#334155">accept(anchor_id)  ·  reject(anchor_id)  ·  add_note(anchor_id, text)</text>

    <text x="60" y="868" font-size="11" font-weight="700" fill="#166534">out</text>
    <text x="84" y="868" font-size="11" fill="#334155">DecisionRecord {anchor_id, decision: approved|rejected, reviewer_id, timestamp, note}</text>

    <text x="60" y="892" font-size="10" fill="#14532d" font-style="italic">
      · accept promotes anchor + all substructures to approved (terminal)
    </text>
    <text x="60" y="908" font-size="10" fill="#14532d" font-style="italic">
      · reject drops anchor + all substructures; no automatic rerun of C/D
    </text>
  </g>

  <!-- Output -->
  <line x1="700" y1="930" x2="700" y2="958" stroke="#2b8a3e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <g filter="url(#shadow)">
    <rect x="380" y="958" width="640" height="34" rx="17" fill="#facc15" stroke="#92400e" stroke-width="1.5"/>
    <text x="700" y="980" text-anchor="middle" font-size="12" font-weight="700">v1 output: approved structured knowledge on disk</text>
  </g>
</svg>
